{% extends "base.html" %}

{% block title %}客户详情 - 图灵慧美智能体{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">
                    <i class="fas fa-user"></i> 客户详情
                    <small class="text-muted">（员工ID: {{ follow_user_id }}, 客户ID: {{ external_id }}）</small>
                </h5>
                <a href="javascript:history.back()" class="btn btn-back">
                    <i class="fas fa-arrow-left"></i> 返回
                </a>
            </div>
            <div class="card-body">
                <div id="customerDetailContainer">
                    <div class="text-center">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">加载中...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(document).ready(function() {
    const followUserId = '{{ follow_user_id }}';
    const externalId = '{{ external_id }}';
    
    // 加载客户详情
    function loadCustomerDetail() {
        $.get('/api/customer_detail/' + followUserId + '/' + externalId)
            .done(function(response) {
                if (response.success) {
                    renderCustomerDetail(response.data);
                } else {
                    showAlert('加载客户详情失败: ' + response.error, 'danger');
                }
            })
            .fail(function() {
                showAlert('网络错误，请稍后重试', 'danger');
            });
    }
    
    // 渲染客户详情
    function renderCustomerDetail(data) {
        const container = $('#customerDetailContainer');
        container.empty();
        
        if (!data.customer) {
            container.append('<div class="text-center text-muted">客户不存在</div>');
            return;
        }
        
        // 客户基本信息
        const customerInfo = `
            <div class="row">
                <div class="col-md-6">
                    <div class="card mb-4">
                        <div class="card-header">
                            <h6 class="mb-0"><i class="fas fa-user"></i> 基本信息</h6>
                        </div>
                        <div class="card-body">
                            <dl class="row">
                                <dt class="col-sm-4">客户昵称:</dt>
                                <dd class="col-sm-8">${data.customer.name || '-'}</dd>
                                <dt class="col-sm-4">备注名:</dt>
                                <dd class="col-sm-8">${data.customer.remark_name || '-'}</dd>
                                <dt class="col-sm-4">外部ID:</dt>
                                <dd class="col-sm-8"><code>${data.customer.external_id}</code></dd>
                                <dt class="col-sm-4">Union ID:</dt>
                                <dd class="col-sm-8"><code>${data.customer.union_id}</code></dd>
                            </dl>
                        </div>
                    </div>
                </div>
                
                <div class="col-md-6">
                    <div class="card mb-4">
                        <div class="card-header">
                            <h6 class="mb-0"><i class="fas fa-tags"></i> 标签信息</h6>
                        </div>
                        <div class="card-body">
                            <div id="customerTags">
                                ${renderCustomerTags(data.tags)}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="row">
                <div class="col-12">
                    <div class="card mb-4">
                        <div class="card-header">
                            <h6 class="mb-0"><i class="fas fa-user-circle"></i> Profile信息</h6>
                        </div>
                        <div class="card-body">
                            ${renderProfileItems(data.profile)}
                        </div>
                    </div>
                </div>
            </div>
        `;
        
        container.append(customerInfo);
        
        // 原始JSON数据
        const jsonData = `
            <div class="card">
                <div class="card-header">
                    <h6 class="mb-0">原始JSON数据</h6>
                </div>
                <div class="card-body">
                    <div class="accordion" id="jsonAccordion">
                        <div class="accordion-item">
                            <h2 class="accordion-header" id="customerJsonHeader">
                                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#customerJsonCollapse">
                                    客户基本信息
                                </button>
                            </h2>
                            <div id="customerJsonCollapse" class="accordion-collapse collapse" data-bs-parent="#jsonAccordion">
                                <div class="accordion-body">
                                    <pre class="bg-light p-3 rounded"><code>${JSON.stringify(data.customer, null, 2)}</code></pre>
                                </div>
                            </div>
                        </div>
                        <div class="accordion-item">
                            <h2 class="accordion-header" id="tagsJsonHeader">
                                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#tagsJsonCollapse">
                                    标签信息
                                </button>
                            </h2>
                            <div id="tagsJsonCollapse" class="accordion-collapse collapse" data-bs-parent="#jsonAccordion">
                                <div class="accordion-body">
                                    <pre class="bg-light p-3 rounded"><code>${JSON.stringify(data.tags, null, 2)}</code></pre>
                                </div>
                            </div>
                        </div>
                        <div class="accordion-item">
                            <h2 class="accordion-header" id="profileJsonHeader">
                                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#profileJsonCollapse">
                                    Profile信息
                                </button>
                            </h2>
                            <div id="profileJsonCollapse" class="accordion-collapse collapse" data-bs-parent="#jsonAccordion">
                                <div class="accordion-body">
                                    <pre class="bg-light p-3 rounded"><code>${JSON.stringify(data.profile, null, 2)}</code></pre>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;
        
        container.append(jsonData);
    }
    
    // 渲染客户标签
    function renderCustomerTags(tags) {
        // tags 是一个标签对象数组，包含完整的标签信息
        if (!tags || !Array.isArray(tags) || tags.length === 0) {
            return '<span class="text-muted">暂无标签</span>';
        }
        
        let html = '';
        tags.forEach(function(tag) {
            const tagName = tag.tag_name || '未知标签';
            html += `<span class="badge bg-primary me-1 mb-1">${tagName}</span>`;
        });
        
        return html;
    }
    
    // 渲染Profile信息
    function renderProfileItems(profile) {
        if (!profile || !profile.profile_items || !Array.isArray(profile.profile_items) || profile.profile_items.length === 0) {
            return '<div class="text-muted">暂无Profile信息</div>';
        }
        
        let html = '<div class="row">';
        profile.profile_items.forEach(function(item, index) {
            const itemName = item.item_name || '未知字段';
            const itemValue = item.item_value || '-';
            
            // 每行显示两个字段，使用col-md-6
            if (index % 2 === 0) {
                html += '<div class="col-md-6 mb-3">';
            }
            
            html += `
                <div class="profile-item">
                    <dt class="fw-bold text-muted small">${itemName}:</dt>
                    <dd class="mb-2">${itemValue}</dd>
                </div>
            `;
            
            if (index % 2 === 1 || index === profile.profile_items.length - 1) {
                html += '</div>';
            }
        });
        html += '</div>';
        
        return html;
    }
    
    // 显示提示信息
    function showAlert(message, type) {
        const alert = `
            <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        `;
        $('.container-fluid').prepend(alert);
    }
    
    // 初始加载
    loadCustomerDetail();
});
</script>
{% endblock %}
