{% extends "base.html" %}

{% block title %}员工客户列表 - 图灵慧美智能体{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">
                    <i class="fas fa-users"></i> 员工客户列表
                    <small class="text-muted">（员工ID: {{ user_id }}）</small>
                </h5>
                <a href="{{ url_for('employees') }}" class="btn btn-back">
                    <i class="fas fa-arrow-left"></i> 返回员工列表
                </a>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>客户昵称</th>
                                <th>备注名</th>
                                <th>外部ID</th>
                                <th>Union ID</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="customerTableBody">
                            <tr>
                                <td colspan="5" class="text-center">
                                    <div class="spinner-border text-primary" role="status">
                                        <span class="visually-hidden">加载中...</span>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(document).ready(function() {
    const userId = '{{ user_id }}';
    
    // 加载客户列表
    function loadCustomers() {
        $.get('/api/employee_customers/' + userId)
            .done(function(response) {
                if (response.success) {
                    renderCustomerTable(response.data);
                } else {
                    showAlert('加载客户列表失败: ' + response.error, 'danger');
                }
            })
            .fail(function() {
                showAlert('网络错误，请稍后重试', 'danger');
            });
    }
    
    // 渲染客户表格
    function renderCustomerTable(customers) {
        const tbody = $('#customerTableBody');
        tbody.empty();
        
        if (customers.length === 0) {
            tbody.append('<tr><td colspan="5" class="text-center text-muted">该员工暂无客户数据</td></tr>');
            return;
        }
        
        customers.forEach(function(customer) {
            const row = `
                <tr>
                    <td>${customer.name || '-'}</td>
                    <td>${customer.remark_name || '-'}</td>
                    <td><code>${customer.external_id}</code></td>
                    <td><code>${customer.union_id}</code></td>
                    <td>
                        <div class="btn-group btn-group-sm action-buttons">
                            <button class="btn btn-outline-info" onclick="viewCustomerDetail('${customer.external_id}')">
                                <i class="fas fa-eye"></i> 查看详情
                            </button>
                            <button class="btn btn-outline-primary" onclick="viewChatRecords('${userId}', '${customer.external_id}')">
                                <i class="fas fa-comments"></i> 对话记录
                            </button>
                            <button class="btn btn-outline-warning" onclick="viewKfRecords('${customer.external_id}')">
                                <i class="fas fa-headset"></i> 客服记录
                            </button>
                            <button class="btn btn-outline-success" onclick="viewCustomerOrders('${customer.union_id}')">
                                <i class="fas fa-shopping-cart"></i> 客户订单
                            </button>
                        </div>
                    </td>
                </tr>
            `;
            tbody.append(row);
        });
    }
    
    // 查看客户详情
    window.viewCustomerDetail = function(externalId) {
        window.location.href = '/customer_detail/' + userId + '/' + externalId;
    };
    
    // 查看对话记录
    window.viewChatRecords = function(userId, externalId) {
        window.location.href = '/chat_records/' + userId + '/' + externalId;
    };
    
    // 查看客服记录
    window.viewKfRecords = function(externalId) {
        window.location.href = '/kf_records/' + externalId;
    };
    
    // 查看客户订单
    window.viewCustomerOrders = function(unionId) {
        window.location.href = '/customer_orders/' + unionId;
    };
    
    // 显示提示信息
    function showAlert(message, type) {
        const alert = `
            <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        `;
        $('.container-fluid').prepend(alert);
    }
    
    // 初始加载
    loadCustomers();
});
</script>
{% endblock %}
