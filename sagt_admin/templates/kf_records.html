{% extends "base.html" %}

{% block title %}客服记录 - 图灵慧美智能体{% endblock %}

{% block head %}
<style>
    /* 确保页面内容区域能够撑满剩余高度 */
    .container-fluid {
        min-height: calc(100vh - 56px); /* 减去导航栏高度 */
        display: flex;
        flex-direction: column;
    }
    
    .row {
        flex: 1;
        display: flex;
    }
    
    .card {
        display: flex;
        flex-direction: column;
        height: 100%;
    }
    
    .card-body {
        flex: 1;
        overflow: hidden;
    }
    
    #kfRecordsContainer {
        height: 100%;
    }
</style>
{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">
                    <i class="fas fa-headset"></i> 客服记录
                    <small class="text-muted">（客户ID: {{ external_id }}）</small>
                </h5>
                <div class="d-flex align-items-center">
                    <div class="me-3">
                        <label for="dateFilter" class="form-label mb-0 me-2">开始日期:</label>
                        <input type="date" id="dateFilter" class="form-control form-control-sm" style="width: 150px; display: inline-block;">
                    </div>
                    <button class="btn btn-primary btn-sm me-2" onclick="loadKfRecords()">
                        <i class="fas fa-search"></i> 查询
                    </button>
                    <button class="btn btn-back" onclick="history.back()">
                        <i class="fas fa-arrow-left"></i> 返回
                    </button>
                </div>
            </div>
            <div class="card-body">
                <div id="kfRecordsContainer">
                    <div class="text-center">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">加载中...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(document).ready(function() {
    const externalId = '{{ external_id }}';
    
    // 初始化日期选择器为365天前
    function initDateFilter() {
        const thirtyDaysAgo = new Date();
        thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 365);
        $('#dateFilter').val(thirtyDaysAgo.toISOString().split('T')[0]);
    }
    
    // 加载客服记录
    window.loadKfRecords = function() {
        const afterDate = $('#dateFilter').val();
        let url = '/api/kf_records/' + externalId;
        
        if (afterDate) {
            const afterYyyyMmDd = afterDate.replace(/-/g, '');
            url += '?after_yyyy_mm_dd=' + afterYyyyMmDd;
        }
        
        $('#kfRecordsContainer').html(`
            <div class="text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">加载中...</span>
                </div>
            </div>
        `);
        
        $.get(url)
            .done(function(response) {
                if (response.success) {
                    displayKfRecords(response.data);
                } else {
                    showAlert('加载客服记录失败: ' + response.error, 'danger');
                }
            })
            .fail(function() {
                showAlert('网络错误，请稍后重试', 'danger');
            });
    };
    
    // 显示客服记录
    function displayKfRecords(records) {
        const container = $('#kfRecordsContainer');
        
        if (!records || records.length === 0) {
            container.html(`
                <div class="text-center text-muted">
                    <i class="fas fa-comments fa-3x mb-3"></i>
                    <p>暂无客服记录</p>
                </div>
            `);
            return;
        }
        
        // 按时间排序（最新的在前）
        records.sort((a, b) => b.msg_time - a.msg_time);
        
        let html = '<div class="chat-container">';
        
        records.forEach(record => {
            const messageTime = new Date(record.msg_time * 1000);
            const timeStr = messageTime.toLocaleString('zh-CN');
            
            // 判断消息来源
            const isCustomer = record.origin === 3; // 3表示客户发送
            const isAgent = record.origin === 5;    // 5表示客服发送
            
            let senderInfo = '';
            let messageClass = '';
            let senderIcon = '';
            
            if (isCustomer) {
                senderInfo = '客户';
                messageClass = 'customer-message';
                senderIcon = 'fas fa-user';
            } else if (isAgent) {
                senderInfo = '客服';
                if (record.servicer_userid) {
                    senderInfo += ` (${record.servicer_userid})`;
                }
                messageClass = 'agent-message';
                senderIcon = 'fas fa-headset';
            } else {
                senderInfo = '系统';
                messageClass = 'system-message';
                senderIcon = 'fas fa-cog';
            }
            
            html += `
                <div class="message-item ${messageClass} mb-3">
                    <div class="message-header d-flex justify-content-between align-items-center mb-2">
                        <div class="sender-info">
                            <i class="${senderIcon} me-2"></i>
                            <strong>${senderInfo}</strong>
                        </div>
                        <small class="text-muted">${timeStr}</small>
                    </div>
                    <div class="message-content">
                        <div class="message-bubble p-3 rounded">
                            ${escapeHtml(record.content)}
                        </div>
                    </div>
                    <div class="message-meta mt-2">
                        <small class="text-muted">
                            消息ID: ${record.msg_id} | 
                            类型: ${record.msg_type} |
                            客服账号: ${record.open_kfid || '-'}
                        </small>
                    </div>
                </div>
            `;
        });
        
        html += '</div>';
        
        // 添加样式
        html += `
            <style>
                .chat-container {
                    height: 100%;
                    overflow-y: auto;
                    padding-right: 10px;
                }
                
                .message-item {
                    border-left: 4px solid #dee2e6;
                    padding-left: 15px;
                }
                
                .customer-message {
                    border-left-color: #0d6efd;
                }
                
                .agent-message {
                    border-left-color: #198754;
                }
                
                .system-message {
                    border-left-color: #6c757d;
                }
                
                .customer-message .message-bubble {
                    background-color: #e3f2fd;
                    border: 1px solid #bbdefb;
                }
                
                .agent-message .message-bubble {
                    background-color: #e8f5e8;
                    border: 1px solid #c8e6c9;
                }
                
                .system-message .message-bubble {
                    background-color: #f5f5f5;
                    border: 1px solid #e0e0e0;
                }
                
                .message-bubble {
                    word-wrap: break-word;
                    white-space: pre-wrap;
                }
                
                .sender-info {
                    font-weight: 500;
                }
                
                .message-meta {
                    font-size: 0.8rem;
                }
                
                /* 自定义滚动条样式 */
                .chat-container::-webkit-scrollbar {
                    width: 8px;
                }
                
                .chat-container::-webkit-scrollbar-track {
                    background: #f1f1f1;
                    border-radius: 4px;
                }
                
                .chat-container::-webkit-scrollbar-thumb {
                    background: #c1c1c1;
                    border-radius: 4px;
                }
                
                .chat-container::-webkit-scrollbar-thumb:hover {
                    background: #a8a8a8;
                }
            </style>
        `;
        
        container.html(html);
    }
    
    // HTML转义函数
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // 显示提示信息
    function showAlert(message, type) {
        const alert = `
            <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        `;
        $('.container-fluid').prepend(alert);
    }
    
    // 初始化
    initDateFilter();
    loadKfRecords();
});
</script>
{% endblock %}
